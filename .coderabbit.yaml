language: en-US

tone_instructions: >
  Be concise and pragmatic. This module has UI / web-serving code — flag XSS, CSRF, and endpoint-security issues aggressively.

early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "`@coderabbitai` summary"
  high_level_summary_in_walkthrough: true
  auto_title_placeholder: "`@coderabbitai` title"
  sequence_diagrams: true
  collapse_walkthrough: false
  changed_files_summary: true
  poem: false
  suggested_labels: true
  suggested_reviewers: false
  related_issues: true
  related_prs: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/*.md"
    - "!**/target/**"
  path_instructions:
    - path: "**/*"
      instructions: >
        Flag correctness, concurrency, resource-leak,
        security, and performance issues aggressively. When a change appears to
        alter an existing architectural pattern or introduce new shared/stateful
        infrastructure, call that out explicitly as an "architecture" concern
        rather than a routine style comment.
        In addition to routine correctness review, explicitly call out:
        (1) Security-relevant concerns — injection risks (e.g. building
        glob/regex/SQL/shell patterns from variable input), credential or
        secret handling, unsafe deserialization, missing input validation,
        or SSRF/timeout gaps in network/process-execution code.
        (2) Performance/concurrency concerns — thread-safety of shared
        mutable state, blocking calls inside virtual threads, unbounded
        resource usage, and missing cancellation/cleanup on
        timeout/failure paths.
        (3) Architectural concerns — new stateful/shared infrastructure,
        changes to existing module contracts, or new coupling between
        packages that weren't previously related. When such a change is
        found, describe the concern and suggest what should be verified
        or documented.
        Module-specific additions for this repository:
        This module serves UI or web endpoints. In addition to the standard checks, watch for: (1) XSS — any user-controlled text rendered without escaping; be especially strict on HTML/JS emitted from server code and on template substitution; (2) CSRF — state-changing HTTP methods without CSRF protection; (3) open redirects — user input flowing into Location headers or redirect targets; (4) endpoint authorization — new routes without a check, or checks bypassable via parameter tampering; (5) SSRF — new HTTP-fetch code paths driven by user-supplied URLs; (6) session/cookie handling — Secure/HttpOnly/SameSite flags, session fixation risk; (7) accidental exposure of internal error details or stack traces in responses.
  abort_on_close: true
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
